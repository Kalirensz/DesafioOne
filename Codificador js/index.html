<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Codificador One</title>
    <link rel="stylesheet" href="/CSS/styles.css">
</head>
<body>
    <main class="Main-Container">
        <header class="cabecalho">
            <img src="/Imagens/icon-star.png" alt="logo">
            <h1>Codificador de mensagem</h1>
        </header>
        <div class="content">
            <div class="container-input">
                <div class="input">
                    <textarea id="input-texto" placeholder="Digite seu texto aqui..."></textarea>
                    <p>Atenção: Somente letras minúsculas e sem acento</p>
                </div>
            </div>
            <div id="output">
                <h2>Sua Mensagem aparecerá aqui!</h2>
                <span>Digite um texto para ser Codificado</span>
            </div>
        </div>
        <div class="buttons">
            <button onclick="criptografar()" class="btn-cripitografar">Criptografar</button>
            <button onclick="descriptografar()" class="btn-descritografar">Descriptografar</button>
        </div>
    </main>
    <script src="interacao/script.js"></script>
</body>
</html>
